name: CI

on:
  push:
    branches: [master, battle-royale]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GAME_VERSION: EMERALD
      GAME_REVISION: 0
      GAME_LANGUAGE: ENGLISH
      MODERN: 0
      COMPARE: ${{ github.ref == 'refs/heads/master' && 1 || 0 }}
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Checkout syms
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@master
        with:
          path: symbols
          ref: symbols

      - name: Checkout agbcc
        uses: actions/checkout@master
        with:
          path: agbcc
          repository: pret/agbcc

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install build-essential gcc-arm-none-eabi binutils-arm-none-eabi libpng-dev
        # build-essential: gcc, make, and core build libraries (matches INSTALL.md)
        # gcc-arm-none-eabi: required for the modern build as an alternative to dkP
        # git is already pre-installed on ubuntu-latest runners

      - name: Install agbcc
        run: |
          ./build.sh
          ./install.sh ../
        working-directory: agbcc

      - name: Compare
        run: make -j${nproc} all syms

      - name: Modern
        env:
          MODERN: 1
          COMPARE: 0
        run: make -j${nproc} all

      - name: Move symfiles
        if: ${{ github.event_name == 'push' }}
        run: |
          cp -v *.sym symbols/
          echo "SYMBOLS_COMMIT_MSG=$( git log --format=%s ${GITHUB_SHA} )" >> $GITHUB_ENV

      - name: Update symfiles
        if: ${{ github.event_name == 'push' }}
        uses: EndBug/add-and-commit@v7
        with:
          branch: symbols
          cwd: "./symbols"
          add: "*.sym"
          message: ${{ env.SYMBOLS_COMMIT_MSG }}

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: pokeemerald
          path: pokeemerald.gba
